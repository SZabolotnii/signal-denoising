name: CD - Deploy to RunPod and Train

on:
  workflow_dispatch:
    inputs:
      gpu_type:
        description: 'GPU Type'
        required: true
        type: choice
        default: 'NVIDIA RTX A5000'
        options:
          - NVIDIA GeForce RTX 3090
          - NVIDIA GeForce RTX 4090
          - NVIDIA RTX A2000
          - NVIDIA RTX A2000 Ada
          - NVIDIA RTX A4000
          - NVIDIA RTX A4000 Ada
          - NVIDIA RTX A4500
          - NVIDIA RTX A5000
          - NVIDIA RTX A6000

      deploy_scope:
        description: 'Region scope for auto-placement'
        required: true
        type: choice
        default: 'EU+US'
        options:
          - EU
          - US
          - EU+US
          - ALL

      storage_size_gb:
        description: 'Pod volume size in GB for dataset, checkpoints, and logs'
        required: true
        type: string
        default: '150'

      replace_existing_pod:
        description: 'Replace existing pod (terminate old pod before deploying new one)'
        required: false
        type: boolean
        default: true

      use_spot:
        description: 'Use Spot Instance (cheaper but can be interrupted)'
        required: false
        type: boolean
        default: false

      extra_envs:
        description: |
          Extra environment variables (KEY=VALUE pairs) to pass to the Pod runtime
          Format: space-separated, comma-separated, or one per line
          Example: DEBUG=true LOG_LEVEL=info
        required: false
        type: string
        default: ''

      dataset_path:
        description: 'Dataset name (to download from S3) or path inside the pod'
        required: true
        type: string
        default: 'deep_space_polygauss_qpsk_bs1024_n3000_993897f3'

      wandb_project:
        description: 'W&B Project name for logging'
        required: false
        type: string
        default: 'signal-denoising-v2'

      extra_docker_args:
        description: 'Additional CLI arguments to pass to the entrypoint'
        required: false
        type: string
        default: ''

      model:
        description: 'Model to train'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - resnet
          - unet
          - vae
          - transformer
          - hybrid
          - wavelet

      image_tag:
        description: 'Docker image tag (e.g., latest, containerize-training)'
        required: true
        type: string
        default: 'latest'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: signal-denoising
  POD_NAME: signal-denoising-train
  TEMPLATE_NAME: signal-denoising-train
  REGISTRY_NAME: ecr-signal-denoising
  VOLUME_MOUNT_PATH: /app/data

jobs:
  deploy:
    name: Deploy to RunPod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR image details
        id: image
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          IMAGE_URI="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          ECR_TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})

          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "token=${ECR_TOKEN}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Run ID
        id: run_id
        run: |
          RUN_DATE=$(date +'%Y%m%d')
          RUN_UID=$(openssl rand -hex 4)
          RUN_ID="run_${RUN_DATE}_${RUN_UID}_github_${{ github.run_number }}"
          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
          echo "🚀 Generated Run ID: ${RUN_ID}"

      - name: Install RunPod SDK
        run: pip install runpod

      - name: Create/Update Registry Credentials
        id: registry
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          #!/bin/bash
          set -e
          export REGISTRY_NAME="${{ env.REGISTRY_NAME }}"
          export ECR_TOKEN="${{ steps.image.outputs.token }}"
          cd .github/scripts
          python runpod_manage_ecr_creds.py

      - name: Create/Update Template
        id: template
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          #!/bin/bash
          set -e
          export TEMPLATE_NAME="${{ env.TEMPLATE_NAME }}"
          export IMAGE_URI="${{ steps.image.outputs.image_uri }}"
          export REGISTRY_ID="${{ steps.registry.outputs.registry_id }}"
          export VOLUME_SIZE_GB="${{ inputs.storage_size_gb }}"
          export VOLUME_MOUNT_PATH="${{ env.VOLUME_MOUNT_PATH }}"
          export DATASET_PATH="${{ inputs.dataset_path }}"
          export WANDB_PROJECT="${{ inputs.wandb_project }}"
          export EXTRA_DOCKER_ARGS="${{ inputs.extra_docker_args }}"
          export MODEL="${{ inputs.model }}"
          export RUN_ID="${{ steps.run_id.outputs.run_id }}"
          export IMAGE_TAG="${{ inputs.image_tag }}"
          export RUNPOD_API_KEY_SECRET="${{ secrets.RUNPOD_API_KEY }}"
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export S3_BUCKET="${{ secrets.S3_BUCKET }}"
          export WANDB_API_KEY="${{ secrets.WANDB_API_KEY }}"
          export EXTRA_ENVS_STR="${{ inputs.extra_envs }}"

          cd .github/scripts
          python runpod_manage_template.py

      - name: Deploy Pod
        id: pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          #!/bin/bash
          set -e
          export TEMPLATE_NAME="${{ env.TEMPLATE_NAME }}"
          export POD_NAME="${{ env.POD_NAME }}"
          export TEMPLATE_ID="${{ steps.template.outputs.template_id }}"
          export IMAGE_URI="${{ steps.image.outputs.image_uri }}"
          export GPU_TYPE="${{ inputs.gpu_type }}"
          export USE_SPOT="${{ inputs.use_spot }}"
          export USE_NETWORK_VOLUME="false"
          export REPLACE="${{ inputs.replace_existing_pod }}"
          export DATA_CENTER_ID="AUTO"
          export DEPLOY_SCOPE="${{ inputs.deploy_scope }}"
          export VOLUME_SIZE_GB="${{ inputs.storage_size_gb }}"
          export VOLUME_MOUNT_PATH="${{ env.VOLUME_MOUNT_PATH }}"

          cd .github/scripts
          python runpod_manage_pod.py

      - name: Update Template with Pod ID
        id: update_template
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          #!/bin/bash
          set -e
          export TEMPLATE_NAME="${{ env.TEMPLATE_NAME }}"
          export IMAGE_URI="${{ steps.image.outputs.image_uri }}"
          export REGISTRY_ID="${{ steps.registry.outputs.registry_id }}"
          export VOLUME_SIZE_GB="${{ inputs.storage_size_gb }}"
          export VOLUME_MOUNT_PATH="${{ env.VOLUME_MOUNT_PATH }}"
          export DATASET_PATH="${{ inputs.dataset_path }}"
          export WANDB_PROJECT="${{ inputs.wandb_project }}"
          export EXTRA_DOCKER_ARGS="${{ inputs.extra_docker_args }}"
          export MODEL="${{ inputs.model }}"
          export RUN_ID="${{ steps.run_id.outputs.run_id }}"
          export IMAGE_TAG="${{ inputs.image_tag }}"
          export RUNPOD_API_KEY_SECRET="${{ secrets.RUNPOD_API_KEY }}"
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export S3_BUCKET="${{ secrets.S3_BUCKET }}"
          export WANDB_API_KEY="${{ secrets.WANDB_API_KEY }}"
          export EXTRA_ENVS_STR="${{ inputs.extra_envs }}"
          export RUNPOD_POD_ID="${{ steps.pod.outputs.pod_id }}"

          cd .github/scripts
          python runpod_manage_template.py

      - name: Deployment Summary
        if: steps.pod.outputs.action == 'deployed'
        run: |
          echo "## 🚀 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Pod ID** | \`${{ steps.pod.outputs.pod_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Pod URL** | [${{ steps.pod.outputs.pod_url }}](${{ steps.pod.outputs.pod_url }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Template** | \`${{ steps.template.outputs.template_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | \`${{ steps.registry.outputs.registry_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **GPU** | ${{ inputs.gpu_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deploy Scope** | ${{ inputs.deploy_scope }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Chosen Data Center** | ${{ steps.pod.outputs.datacenter }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Storage Size** | ${{ inputs.storage_size_gb }} GB |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ steps.image.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Skipped Summary
        if: steps.pod.outputs.action == 'skipped'
        run: |
          echo "## ⚠️ Deployment Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pod \`${{ env.POD_NAME }}\` already exists." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pod URL:** ${{ steps.pod.outputs.pod_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To replace, run with 'Replace existing pod' checked." >> $GITHUB_STEP_SUMMARY